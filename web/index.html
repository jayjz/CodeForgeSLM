<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeForge AI Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <style>
        .progress-bar {
            transition: width 0.5s ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans">
    <div x-data="dashboard()" x-init="init()" class="min-h-screen">
        <header class="bg-white shadow-md">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
                <div class="flex items-center space-x-2">
                    <span class="text-3xl">🤖</span>
                    <h1 class="text-2xl font-bold text-gray-800">CodeForge AI</h1>
                </div>
                <div class="text-right">
                    <p class="text-sm text-gray-500">Service Status</p>
                    <div class="flex items-center space-x-2">
                        <span class="relative flex h-3 w-3">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                        </span>
                        <span class="font-semibold text-green-600">Online</span>
                    </div>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-1 bg-white rounded-lg shadow p-6 h-fit">
                    <h2 class="text-xl font-bold mb-4 text-gray-900">Start a New Job</h2>
                    <form @submit.prevent="startNewJob()">
                        <div class="space-y-4">
                            <div>
                                <label for="repo_url" class="block text-sm font-medium text-gray-700">Repository URL</label>
                                <input type="url" id="repo_url" x-model="newJob.repo_url" required
                                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                            </div>
                            <div>
                                <label for="goals" class="block text-sm font-medium text-gray-700">Modernization Goals</label>
                                <textarea id="goals" x-model="newJob.goals" rows="3" required
                                          class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
                                          placeholder="e.g., Upgrade to Python 3.12, Add full test coverage"></textarea>
                            </div>
                            <button type="submit" :disabled="submitting"
                                    class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:bg-indigo-300">
                                <span x-show="!submitting">🚀 Forge My Code</span>
                                <span x-show="submitting">Submitting...</span>
                            </button>
                        </div>
                    </form>
                </div>

                <div class="lg:col-span-2">
                     <h2 class="text-xl font-bold mb-4 text-gray-900">Active Jobs</h2>
                     <div x-show="jobs.length === 0" class="text-center bg-white rounded-lg shadow p-8">
                        <p class="text-gray-500">No jobs running. Start one to see its progress here.</p>
                     </div>
                     <div class="space-y-4">
                        <template x-for="job in jobs" :key="job.job_id">
                            <div class="bg-white rounded-lg shadow p-5">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <p class="font-mono text-sm text-gray-500" x-text="job.job_id.split('-')[0]"></p>
                                        <p class="font-semibold text-gray-800" x-text="job.details"></p>
                                    </div>
                                    <span class="px-3 py-1 text-xs font-semibold rounded-full"
                                          :class="{
                                              'bg-yellow-100 text-yellow-800': job.status === 'PENDING',
                                              'bg-blue-100 text-blue-800': job.status === 'RUNNING',
                                              'bg-green-100 text-green-800': job.status === 'COMPLETED',
                                              'bg-red-100 text-red-800': job.status === 'FAILED'
                                          }"
                                          x-text="job.status">
                                    </span>
                                </div>
                                <div class="mt-4">
                                    <div class="w-full bg-gray-200 rounded-full h-2.5">
                                        <div class="bg-indigo-600 h-2.5 rounded-full progress-bar" :style="`width: ${job.progress * 100}%`"></div>
                                    </div>
                                </div>
                                <div x-show="job.status === 'COMPLETED' && job.result" class="mt-3 text-sm text-green-700 bg-green-50 p-3 rounded-md">
                                    <p>✅ Success! Find your changes in branch: <strong x-text="job.result.new_branch"></strong></p>
                                </div>
                            </div>
                        </template>
                     </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function dashboard() {
            return {
                jobs: [],
                submitting: false,
                newJob: {
                    repo_url: 'https://github.com/pallets/flask',
                    goals: 'Upgrade dependencies to latest versions and add docstrings to all public functions.',
                    branch_name: 'codeforge-flask-upgrade'
                },

                init() {
                    this.fetchJobs();
                    setInterval(() => this.fetchJobs(), 3000); // Poll every 3 seconds
                },

                async fetchJobs() {
                    try {
                        const response = await fetch('/api/jobs');
                        if (!response.ok) throw new Error('Network response was not ok');
                        const data = await response.json();
                        // Sort jobs to show newest first
                        this.jobs = data.sort((a, b) => new Date(b.timestamp || 0) - new Date(a.timestamp || 0));
                    } catch (error) {
                        console.error("Failed to fetch jobs:", error);
                    }
                },

                async startNewJob() {
                    if (this.submitting) return;
                    this.submitting = true;

                    try {
                        const goalsArray = this.newJob.goals.split(',').map(g => g.trim()).filter(g => g);
                        const response = await fetch('/api/jobs', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                repo_url: this.newJob.repo_url,
                                goals: goalsArray,
                                branch_name: this.newJob.branch_name,
                            }),
                        });

                        if (!response.ok) {
                            const errorData = await response.json();
                            throw new Error(errorData.detail || 'Failed to start job');
                        }
                        
                        // Add a timestamp to new jobs for sorting
                        const newJobData = await response.json();
                        this.jobs.unshift({ ...newJobData, status: 'PENDING', details: 'Job accepted and queued.', progress: 0, timestamp: new Date().toISOString() });
                        
                        // Reset form
                        this.newJob.repo_url = '';
                        this.newJob.goals = '';

                    } catch (error) {
                        alert(`Error: ${error.message}`);
                    } finally {
                        this.submitting = false;
                        this.fetchJobs(); // Refresh list immediately
                    }
                }
            }
        }
    </script>
</body>
</html>
