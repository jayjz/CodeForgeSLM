version: '3.8'

services:
  codeforge-api:
    build: .
    container_name: codeforge_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./temp_repos:/app/temp_repos
      - ./logs:/app/logs
    depends_on:
      - redis
      # - postgres # Uncomment if you add a real DB connection
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: codeforge_redis
    ports:
      - "6379:6379"
    restart: always

  # Optional PostgreSQL service for persistent job storage
  # postgres:
  #   image: postgres:15
  #   container_name: codeforge_postgres
  #   environment:
  #     - POSTGRES_DB=codeforge
  #     - POSTGRES_USER=codeforge
  #     - POSTGRES_PASSWORD=codeforge_pass
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   restart: always

  # Nginx to serve the web dashboard and proxy API requests
  nginx:
    image: nginx:alpine
    container_name: codeforge_nginx
    ports:
      - "8080:80"
    volumes:
      - ./web:/usr/share/nginx/html # Serve static web dashboard
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - codeforge-api
    restart: always

volumes:
  postgres_data: